# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: ethancannelongo/wildflower-hope-soul-care
  branch: main
  auth_scope: repo

media_folder: /public
public_folder: /

collections:
  - name: pages
    label: Pages
    files:
      - name: about
        label: About Johanna
        file: /content/about.md
        fields:
          - name: picture
            label: Picture
            widget: image
          - name: description
            label: Description
            widget: markdown
          - name: credentialsList
            label: Credentials List
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
          - name: credentialsDescription
            label: Credentials Description
            widget: markdown

      - name: hopesGardenJourney
        label: Hopes Garden Journey
        file: /content/hopes-garden-journey.md
        fields:
          - name: movements
            label: Movements
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: description
                label: Description
                widget: markdown
          - name: pricingOptions
            label: Pricing Options
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: features
                label: Features
                widget: list
                fields:
                  - name: feature
                    label: Feature
                    widget: string
              - name: price
                label: Price
                widget: string

          - name: faqs
            label: FAQs
            widget: list
            fields:
              - name: question
                label: Question
                widget: string
              - name: answer
                label: Answer
                widget: markdown
